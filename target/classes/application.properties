# =====================================================
# AgriConnect - Application Configuration
# OOAD Mini Project | Spring Boot 3.x
# =====================================================

# --- Server ---
server.port=8080
spring.application.name=AgriConnect

# --- DataSource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/agriconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Prakul27#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Data Initialization ---
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- Jackson ---
spring.jackson.serialization.indent-output=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
